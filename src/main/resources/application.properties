#DATASOURCE MYSQL Railway
spring.datasource.username=${MYSQLUSER}
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# ===============================
# JPA HIBERNATE


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.main.lazy-initialization=true


spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Reduce memory usage
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false
spring.jpa.properties.hibernate.generate_statistics=false

# ===============================
# SERVER / TOMCAT EMBEDDED
# ===============================

# Small app, few threads, low RAM
server.tomcat.threads.max=20
server.tomcat.threads.min-spare=5

server.tomcat.accesslog.enabled=false
server.error.include-stacktrace=never

# ===============================
# SPRING MVC
# ===============================

spring.mvc.dispatch-options-request=false
spring.mvc.async.request-timeout=30000

# ===============================
# THYMELEAF
# ===============================

spring.thymeleaf.cache=true
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# ===============================
# LOGGING (MINIMAL)
# ===============================

logging.level.root=WARN
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR

# ===============================
# ACTUATOR (DISABLED)
# ===============================
management.endpoints.enabled-by-default=false

#Mejora la eficiencia al insertar varios registros
spring.jpa.properties.hibernate.jdbc.batch_size=20
