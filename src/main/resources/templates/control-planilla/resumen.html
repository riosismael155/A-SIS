<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Resumen Mensual - Control Planilla</title>
  <style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
    }
    h1, h2, h3 {
        color: #333;
    }
    .info-periodo {
        background-color: #f5f5f5;
        padding: 15px;
        border-radius: 5px;
        margin: 20px 0;
        border-left: 4px solid #28a745;
    }
    .tipo-contrato {
        margin-top: 30px;
        margin-bottom: 10px;
        padding: 10px;
        background-color: #e9ecef;
        border-radius: 5px;
        border-left: 4px solid #007bff;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .tipo-contrato h3 {
        margin: 0;
        color: #0056b3;
    }
    .badge-subtotal {
        background-color: #17a2b8;
        color: white;
        padding: 5px 10px;
        border-radius: 15px;
        font-size: 0.9em;
    }
    table {
        border-collapse: collapse;
        width: 100%;
        margin-top: 10px;
        margin-bottom: 20px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    th, td {
        border: 1px solid #ddd;
        padding: 12px;
        text-align: left;
    }
    th {
        background-color: #28a745;
        color: white;
        font-weight: bold;
    }
    tr:nth-child(even) {
        background-color: #f9f9f9;
    }
    tr:hover {
        background-color: #f5f5f5;
    }
    .numero {
        text-align: right;
        font-family: monospace;
        font-size: 1.1em;
    }
    .subtotal-row {
        background-color: #e8f4f8;
        font-weight: bold;
        border-top: 2px solid #007bff;
        border-bottom: 2px solid #007bff;
    }
    .totales-generales {
        background-color: #28a745;
        color: white;
        font-weight: bold;
        font-size: 1.1em;
    }
    .btn-volver {
        display: inline-block;
        margin-top: 20px;
        margin-right: 10px;
        padding: 10px 20px;
        background-color: #6c757d;
        color: white;
        text-decoration: none;
        border-radius: 5px;
    }
    .btn-volver:hover {
        background-color: #5a6268;
    }
    .sin-datos {
        text-align: center;
        padding: 40px;
        color: #666;
        font-style: italic;
    }
  </style>
</head>
<body>

<h1 th:text="'Resumen Mensual - ' + ${control.nombre}">Resumen Mensual</h1>

<div class="info-periodo">
  <p>
    <strong>Período:</strong>
    <span th:text="${#temporals.format(control.desde, 'dd/MM/yyyy')}"></span>
    →
    <span th:text="${#temporals.format(control.hasta, 'dd/MM/yyyy')}"></span>
  </p>
  <p>
    <strong>Total de empleados:</strong>
    <span th:text="${totalesMensuales.totalesPorEmpleado.size()}"></span>
  </p>
</div>

<!-- Mostrar empleados agrupados por tipo de contrato -->
<div th:if="${not #maps.isEmpty(totalesMensuales.empleadosPorTipoContrato)}">

  <div th:each="entry : ${totalesMensuales.empleadosPorTipoContrato}">
    <!-- Cabecera del tipo de contrato -->
    <div class="tipo-contrato">
      <h3 th:text="'📋 ' + ${entry.key}">Tipo de Contrato</h3>
      <span class="badge-subtotal"
            th:text="${#lists.size(entry.value)} + ' empleados'">
            </span>
    </div>

    <!-- Tabla de empleados de este tipo -->
    <table>
      <thead>
      <tr>
        <th>Empleado</th>
        <th>Horas 50%</th>
        <th>Horas 100%</th>
        <th>Guardias</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="empleado : ${entry.value}">
        <td th:text="${empleado.nombreEmpleado}">Apellido, Nombre</td>
        <td class="numero"
            th:text="${#numbers.formatDecimal(empleado.totalHorasExtra, 1, 2)} + ' hs'">
          0.00 hs
        </td>
        <td class="numero"
            th:text="${#numbers.formatDecimal(empleado.totalFindeFeriado, 1, 2)} + ' hs'">
          0.00 hs
        </td>
        <td class="numero"
            th:text="${empleado.totalGuardias} + ' guardia' + ${empleado.totalGuardias != 1 ? 's' : ''}">
          0 guardias
        </td>
      </tr>


      </tbody>
    </table>
  </div>


</div>

<!-- Mensaje si no hay datos -->
<div th:if="${#maps.isEmpty(totalesMensuales.empleadosPorTipoContrato)}" class="sin-datos">
  <p>No hay registros de horas o guardias para este período</p>
</div>

<!-- Botones de navegación -->
<div style="margin-top: 30px;">
  <a class="btn-volver" th:href="@{/control-planilla/{id}(id=${control.id})}">
    ⬅ Volver al detalle semanal
  </a>
  <a class="btn-volver" th:href="@{/control-planilla}"
     style="background-color: #007bff;">
    ⬅ Volver al listado
  </a>
</div>

</body>
</html>
