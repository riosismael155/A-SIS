<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Control de Planillas</title>
    <style>
        .acciones {
            white-space: nowrap;
        }
        .btn {
            padding: 5px 10px;
            margin: 0 2px;
            text-decoration: none;
            border-radius: 3px;
            color: white;
            display: inline-block;
        }
        .btn-detalle {
            background-color: #007bff;
        }
        .btn-resumen {
            background-color: #28a745;
        }
    </style>
</head>
<body>

<h1>Control de Planillas</h1>

<!-- Crear nuevo -->
<form th:action="@{/control-planilla/crear}" method="post">
    <button type="submit">➕ Crear nuevo control</button>
</form>

<hr>

<h2>Planillas creadas</h2>

<table border="1" cellpadding="5">
    <thead>
    <tr>
        <th>Nombre</th>
        <th>Desde</th>
        <th>Hasta</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="cp : ${controles}">
        <td th:text="${cp.nombre}">nombre</td>
        <td th:text="${#temporals.format(cp.desde, 'dd/MM/yyyy')}">desde</td>
        <td th:text="${#temporals.format(cp.hasta, 'dd/MM/yyyy')}">hasta</td>
        <td class="acciones">
            <a class="btn btn-detalle"
               th:href="@{/control-planilla/{id}(id=${cp.id})}">
                Ver detalle
            </a>
            <a class="btn btn-resumen"
               th:href="@{/control-planilla/{id}/resumen(id=${cp.id})}">
                Ver resumen mensual
            </a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
