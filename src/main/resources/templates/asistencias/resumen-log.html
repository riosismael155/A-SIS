<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('PLANILLA MENSUAL')">
    <link rel="icon" th:href="@{/favicon.ico}" type="image/x-icon"/>

</head>
<body>

<div th:replace="fragments/header :: body"></div>
<main class="flex-fill">
    <div class="container">
        <div class="bloque-elevado px-5 py-4 mt-container">

            <div class="d-flex align-items-center mb-4">
                <a href="/asistencias/logs"
                   class="me-3 color-iconos d-flex align-items-center"
                   title="Volver atrás">
                    <i class="bi bi-arrow-left-circle me-1 fs-5"></i>
                </a>
                <i class="bi bi-bar-chart-fill fs-5 me-2 color-iconos"></i>
                <h4 class="mb-0 text-h">Resumen de Asistencia Mensual</h4>
            </div>

            <script th:src="@{/js/navigation.js}" defer></script>

            <!-- Filtro por tipo de contrato -->
            <div class="row mb-4 align-items-center">
                <!-- Columna del filtro -->
                <div class="col-md-5">
                    <form method="get" th:action="@{/asistencias/resumen-por-log/{logId}(logId=${log.id})}"
                          class="row g-2 align-items-center">
                        <!-- Select con label integrado -->
                        <div class="col-md-7">
                            <div class="input-group">
                    <span class="input-group-text bg-light border-end-0 pe-1">
                        <i class="bi bi-funnel"></i>
                    </span>
                                <select id="tipoContrato" name="tipoContrato" class="form-select border-start-0 ps-1">
                                    <option value="ALL">Todos los contratos</option>
                                    <option th:each="tipo : ${tiposContrato}"
                                            th:value="${tipo.name()}"
                                            th:text="${tipo}"
                                            th:selected="${tipoContratoSeleccionado != null and tipoContratoSeleccionado == tipo}">
                                    </option>
                                </select>
                            </div>
                        </div>

                        <!-- Botones -->
                        <div class="col-md-5">
                            <div class="d-flex">
                                <button type="submit" class="btn-action">
                                    <i class="bi bi-search me-1"></i> Buscar
                                </button>
                            </div>
                        </div>
                    </form>
                </div>

                <!-- Columna del período -->
                <div class="col-md-7">
                    <div class="d-flex justify-content-end align-items-center">
            <span class="badge bg-light text-dark fs-6">
                <strong>Período:</strong>
                <span th:text="${#temporals.format(log.desde, 'dd/MM/yyyy')}"></span> -
                <span th:text="${#temporals.format(log.hasta, 'dd/MM/yyyy')}"></span>
            </span>
                    </div>
                </div>
            </div>
            <!-- Tabla -->
            <div class="table-responsive" style="max-height: 550px; overflow-y: auto;">
                <table class="table table-bordered table-hover table-excel">
                    <thead class="table-dark" style="position: sticky; top: 0; z-index: 10;">
                    <tr>
                        <th onclick="sortTable(0)">DNI <i class="bi bi-funnel sort-icon"></i></th>
                        <th onclick="sortTable(1)">Apellido <i class="bi bi-funnel sort-icon"></i></th>
                        <th onclick="sortTable(2)">Nombre <i class="bi bi-funnel sort-icon"></i></th>
                        <th onclick="sortTable(3)">Total Horas <i class="bi bi-funnel sort-icon"></i></th>
                        <th onclick="sortTable(4)">Normales <i class="bi bi-funnel sort-icon"></i></th>
                        <th onclick="sortTable(5)">Extras <i class="bi bi-funnel sort-icon"></i></th>
                        <th onclick="sortTable(6)">Finde/Feriado <i class="bi bi-funnel sort-icon"></i></th>
                        <th onclick="sortTable(7)">Presentismo <i class="bi bi-funnel sort-icon"></i></th>
                        <th onclick="sortTable(8)">Ausencias Injustificadas <i class="bi bi-funnel sort-icon"></i></th>

                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="e : ${resumen}"
                        th:attr="data-dni=${e.dni}"
                        th:classappend="${ e.tieneMarcasIncompletas ? 'table-danger'
                     : (e.totalAusencias > 0 ? 'table-warning' : 'table-success') }"
                        class="clickable-row"
                        style="cursor:pointer;">
                        <td th:text="${e.dni}"></td>
                        <td th:text="${e.apellido}"></td>
                        <td th:text="${e.nombre}"></td>
                        <td th:text="${#numbers.formatDecimal(e.totalHoras, 1, 1)}"></td>
                        <td th:text="${#numbers.formatDecimal(e.totalNormales, 1, 1)}"></td>
                        <td th:text="${#numbers.formatDecimal(e.totalExtras, 1, 1)}"></td>
                        <td th:text="${#numbers.formatDecimal(e.totalFinde, 1, 1)}"></td>
                        <td th:text="${e.presentismo ? 'Sí' : 'No'}"></td>
                        <td th:text="${e.totalAusencias}"></td>
                    </tr>

                    </tbody>
                </table>
            </div>

        </div>
    </div>
</main>

<div th:replace="fragments/footer :: footer"></div>


<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function () {
        const rows = document.querySelectorAll(".clickable-row");
        const desde = /*[[${#temporals.format(log.desde, 'yyyy-MM-dd')}]]*/ '2025-06-21';
        const hasta = /*[[${#temporals.format(log.hasta, 'yyyy-MM-dd')}]]*/ '2025-07-20';

        rows.forEach(row => {
            row.addEventListener("click", () => {
                const dni = row.getAttribute("data-dni");
                const url = `/asistencias/detalle?dni=${dni}&desde=${desde}&hasta=${hasta}`;
                window.open(url, '_blank');
            });
        });

        // Inicializar sin iconos visibles
        document.querySelectorAll(".sort-icon").forEach(i => {
            i.className = "bi bi-arrow-down-up sort-icon";
            i.style.opacity = "0"; // Completamente transparente al inicio
        });
    });

    // Definimos la función en window para que la encuentren los onclick de los <th>
    window.sortTable = function(n) {
        const tableEl = document.querySelector(".table-excel");
        if (!tableEl) return;
        const tbody = tableEl.querySelector("tbody");
        if (!tbody) return;
        const rows = Array.from(tbody.rows);
        if (rows.length === 0) return;

        // Detectar números (limpiamos puntos y comas comunes en Argentina)
        const sample = rows[0].cells[n].innerText.trim();
        const numericSample = sample.replace(/\./g, '').replace(',', '.');
        const isNumeric = !isNaN(parseFloat(numericSample));

        rows.sort((a, b) => {
            let valA = a.cells[n].innerText.trim();
            let valB = b.cells[n].innerText.trim();

            if (isNumeric) {
                valA = parseFloat(valA.replace(/\./g, '').replace(',', '.')) || 0;
                valB = parseFloat(valB.replace(/\./g, '').replace(',', '.')) || 0;
                return valA - valB;
            } else {
                return valA.localeCompare(valB, undefined, {numeric: true, sensitivity: 'base'});
            }
        });

        // Alternar orden asc/desc
        const prevCol = tableEl.dataset.sortedCol;
        const prevOrder = tableEl.dataset.sortedOrder;
        if (String(prevCol) === String(n) && prevOrder === 'asc') {
            rows.reverse();
            tableEl.dataset.sortedOrder = 'desc';
        } else {
            tableEl.dataset.sortedOrder = 'asc';
        }
        tableEl.dataset.sortedCol = n;

        // Reemplazar filas en tbody
        tbody.innerHTML = "";
        rows.forEach(row => tbody.appendChild(row));

        // Actualizar íconos: reset todos y marcar el activo
        document.querySelectorAll(".sort-icon").forEach(i => {
            i.className = "bi bi-arrow-down-up sort-icon";
            i.style.opacity = "0"; // Ocultar todos
            i.classList.remove('active');
        });

        const th = tableEl.querySelectorAll("thead th")[n];
        const icon = th ? th.querySelector(".sort-icon") : null;
        if (icon) {
            icon.style.opacity = "1"; // Hacer visible el icono activo
            if (tableEl.dataset.sortedOrder === 'asc') {
                icon.className = "bi bi-arrow-up-short sort-icon active";
            } else {
                icon.className = "bi bi-arrow-down-short sort-icon active";
            }
        }
    };
</script>
</body>
</html>
