<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('Editar Horario - A-SIS')">
    <link rel="icon" th:href="@{/favicon.ico}" type="image/x-icon"/>
</head>

<body data-template="editar-horario">

<div th:replace="fragments/header :: body"></div>
<main class="flex-fill">
    <div class="container">
        <div class="bloque-elevado px-5 py-4 mt-container">

            <div class="d-flex align-items-center mb-4">
                <a href="javascript:history.back()"
                   class="me-3 color-iconos d-flex align-items-center"
                   title="Volver atrás">
                    <i class="bi bi-arrow-left-circle me-1 fs-5"></i>
                </a>
                <i class="bi bi-clock fs-5 me-2 color-iconos"></i>
                <h4 class="mb-0 text-h">Editar Horarios</h4>
            </div>

            <!-- Información del empleado y fecha -->
            <div class="mb-4">
                <p class="mb-1"><strong>Empleado:</strong> <span th:text="${edicionDTO.dni}"></span></p>
                <p class="mb-1"><strong>Fecha:</strong> <span th:text="${#temporals.format(edicionDTO.fecha, 'dd/MM/yyyy')}"></span></p>
            </div>

            <!-- Mensaje cuando no hay registros -->
            <div th:if="${!tieneRegistros}" class="alert alert-info">
                No hay registros de asistencia para esta fecha. Debe justificar la ausencia; de lo contrario, estos campos permanecerán vacíos.
            </div>

            <!-- Formulario de edición -->
            <form th:action="@{/asistencias/guardar-horario}" th:object="${edicionDTO}" method="post" class="mt-3">
                <input type="hidden" th:field="*{dni}" />
                <input type="hidden" th:field="*{fecha}" />

                <!-- Primer Horario (solo mostrar si hay registros o si el usuario quiere agregar) -->
                <div class="card mb-4" th:if="${tieneRegistros or edicionDTO.horaEntrada1 != null}">
                    <div class="card-header bg-light">
                        <h5 class="mb-0">Horario Principal</h5>
                    </div>
                    <div class="card-body">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="horaEntrada1" class="form-label">Hora de Entrada</label>
                                <input type="time" class="form-control" id="horaEntrada1"
                                       th:field="*{horaEntrada1}" />
                            </div>

                            <div class="col-md-6">
                                <label for="horaSalida1" class="form-label">Hora de Salida</label>
                                <input type="time" class="form-control" id="horaSalida1"
                                       th:field="*{horaSalida1}" />
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Segundo Horario (solo mostrar si hay registros) -->
                <div class="card mb-4" th:if="${edicionDTO.horaEntrada2 != null}">
                    <div class="card-header bg-light">
                        <h5 class="mb-0">Horario Secundario</h5>
                    </div>
                    <div class="card-body">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="horaEntrada2" class="form-label">Hora de Entrada</label>
                                <input type="time" class="form-control" id="horaEntrada2"
                                       th:field="*{horaEntrada2}" />
                            </div>

                            <div class="col-md-6">
                                <label for="horaSalida2" class="form-label">Hora de Salida</label>
                                <input type="time" class="form-control" id="horaSalida2"
                                       th:field="*{horaSalida2}" />
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Opción para agregar segundo horario si no existe -->
                <div class="card mb-4" th:if="${tieneRegistros and edicionDTO.horaEntrada2 == null}">
                    <div class="card-header bg-light">
                        <h5 class="mb-0">Agregar Horario Secundario</h5>
                    </div>
                    <div class="card-body">
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" id="agregarSegundoHorario"
                                   onchange="toggleSegundoHorario(this)">
                            <label class="form-check-label" for="agregarSegundoHorario">
                                Agregar segundo horario
                            </label>
                        </div>

                        <div id="segundoHorarioFields" class="row mb-3" style="display: none;">
                            <div class="col-md-6">
                                <label for="horaEntrada2" class="form-label">Hora de Entrada</label>
                                <input type="time" class="form-control" id="horaEntrada2"
                                       th:field="*{horaEntrada2}" />
                            </div>

                            <div class="col-md-6">
                                <label for="horaSalida2" class="form-label">Hora de Salida</label>
                                <input type="time" class="form-control" id="horaSalida2"
                                       th:field="*{horaSalida2}" />
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Campo "Motivo del cambio" solo visible si hay registros -->
                <div class="mb-4" th:if="${tieneRegistros}">
                    <label for="motivoCambio" class="form-label">Motivo del cambio</label>
                    <textarea class="form-control" id="motivoCambio" th:field="*{motivoCambio}"
                              rows="3" required></textarea>
                </div>


                <div class="d-flex justify-content-between" th:if="${tieneRegistros}">
                    <button type="submit" class="btn-action">
                        <i class="bi bi-save me-1"></i> Guardar Cambios
                    </button>
                </div>
            </form>

            <!-- Mensajes de éxito/error -->
            <div th:if="${success}" class="alert alert-success mt-3" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger mt-3" th:text="${error}"></div>
        </div>
    </div>
</main>

<div th:replace="fragments/footer :: footer"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Función para mostrar/ocultar campos del segundo horario
    function toggleSegundoHorario(checkbox) {
        const segundoHorarioFields = document.getElementById('segundoHorarioFields');
        segundoHorarioFields.style.display = checkbox.checked ? 'block' : 'none';

        // Limpiar campos si se oculta
        if (!checkbox.checked) {
            document.getElementById('horaEntrada2').value = '';
            document.getElementById('horaSalida2').value = '';
        }
    }
</script>
</body>
</html>
