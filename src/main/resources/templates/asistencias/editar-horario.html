<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('Editar Horario')">
    <link rel="icon" th:href="@{/favicon.ico}" type="image/x-icon"/>
</head>

<body data-template="editar-horario">

<div th:replace="fragments/header :: body"></div>
<main class="flex-fill">
    <div class="container">
        <div class="bloque-elevado px-5 py-4 mt-container">

            <div class="d-flex align-items-center mb-4">
                <a href="javascript:history.back()"
                   class="me-3 color-iconos d-flex align-items-center"
                   title="Volver atrás">
                    <i class="bi bi-arrow-left-circle me-1 fs-5"></i>
                </a>
                <i class="bi bi-clock fs-5 me-2 color-iconos"></i>
                <h4 class="mb-0 text-h">Editar Horarios</h4>
            </div>

            <!-- Información del empleado y fecha -->
            <div class="mb-4">
                <p class="mb-1"><strong>Empleado:</strong> <span th:text="${edicionDTO.dni}"></span></p>
                <p class="mb-1"><strong>Fecha:</strong> <span th:text="${#temporals.format(edicionDTO.fecha, 'dd/MM/yyyy')}"></span></p>
            </div>


            <!-- Mensaje para justificar ausencia -->
            <div th:if="${!tieneRegistros}" class="alert alert-warning d-flex align-items-center justify-content-between p-3 border border-warning rounded">
                <div>
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    No se registró asistencia para esta fecha.
                </div>
                <a th:href="@{/justificaciones/cargar}" class="btn btn-sm">
                    Haz clic aquí para justificar la ausencia
                </a>
            </div>



            <!-- Formulario de edición -->
            <form th:action="@{/asistencias/guardar-horario}" th:object="${edicionDTO}" method="post" class="mt-3">
                <input type="hidden" th:field="*{dni}" />
                <input type="hidden" th:field="*{fecha}" />

                <div id="horariosContainer">
                    <div th:if="${#lists.size(edicionDTO.entradas) > 0 or #lists.size(edicionDTO.salidas) > 0}"
                         th:each="i : ${#numbers.sequence(0, T(java.lang.Math).max(#lists.size(edicionDTO.entradas), #lists.size(edicionDTO.salidas)) - 1)}"
                         class="card mb-4 horario-item">
                        <div class="card-header bg-light">
                            <h5 class="mb-0" th:text="${i == 0 ? 'Horario Principal' : 'Horario Secundario'}"></h5>
                        </div>
                        <div class="card-body">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Hora de Entrada</label>
                                    <input type="time" class="form-control"
                                           th:value="${i < #lists.size(edicionDTO.entradas) ? edicionDTO.entradas[i] : ''}"
                                           th:name="entradas[__${i}__]" />
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Hora de Salida</label>
                                    <input type="time" class="form-control"
                                           th:value="${i < #lists.size(edicionDTO.salidas) ? edicionDTO.salidas[i] : ''}"
                                           th:name="salidas[__${i}__]" />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Botón para agregar otro par de horario (solo si existen registros previos) -->
                <div class="mb-4" th:if="${tieneRegistros}">
                    <button type="button" class="btn btn-outline-secondary" id="agregarHorarioBtn">
                        <i class="bi bi-plus-circle me-1"></i> Agregar otro horario
                    </button>
                </div>

                <!-- Motivo del cambio -->
                <div class="mb-4" th:if="${tieneRegistros}">
                    <label for="motivoCambio" class="form-label">Motivo del cambio</label>
                    <textarea class="form-control" id="motivoCambio" th:field="*{motivoCambio}" rows="3" required></textarea>
                </div>

                <div class="d-flex justify-content-between" th:if="${tieneRegistros}">
                    <button type="submit" class="btn-action">
                        <i class="bi bi-save me-1"></i> Guardar Cambios
                    </button>
                </div>
            </form>

            <!-- Mensajes de éxito/error -->
            <div th:if="${success}" class="alert alert-success mt-3" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger mt-3" th:text="${error}"></div>
        </div>
    </div>
</main>

<div th:replace="fragments/footer :: footer"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.getElementById('agregarHorarioBtn').addEventListener('click', function() {
        const container = document.getElementById('horariosContainer');
        const index = container.querySelectorAll('.horario-item').length;

        // Crear el nuevo bloque de horario
        const newCard = document.createElement('div');
        newCard.classList.add('card', 'mb-4', 'horario-item');
        newCard.innerHTML = `
            <div class="card-header bg-light d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Horario Adicional</h5>
                <button type="button" class="btn btn-sm btn-outline-danger eliminarHorarioBtn" title="Eliminar horario">
                    <i class="bi bi-trash"></i>
                </button>
            </div>
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Hora de Entrada</label>
                        <input type="time" class="form-control" name="entradas[${index}]" />
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Hora de Salida</label>
                        <input type="time" class="form-control" name="salidas[${index}]" />
                    </div>
                </div>
            </div>
        `;

        container.appendChild(newCard);

        // Agregar funcionalidad al botón de eliminar
        newCard.querySelector('.eliminarHorarioBtn').addEventListener('click', () => newCard.remove());
    });
</script>

</body>
</html>
